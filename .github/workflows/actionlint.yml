name: Lint GitHub Actions Workflows
permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go for the pinned actionlint fallback
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Run repository preflight checks
        run: scripts/run-full-build-quiet.sh --preflight-only
