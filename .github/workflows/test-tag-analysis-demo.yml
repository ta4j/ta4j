name: Run Analysis Demo Tagged Tests

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: "7 7 * * *"
    - cron: "17 7 * * 1"
    - cron: "27 7 1 * *"
  workflow_dispatch:
    inputs:
      instrument:
        description: "Provider-qualified instrument, for example coinbase:BTC-USD"
        required: false
        default: "coinbase:BTC-USD"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-analysis-demo:
    name: Build and Test (analysis-demo tag)
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'schedule' &&
          (
            (
              github.event.schedule == '17 7 * * 1' &&
              vars.TA4J_TAGGED_TEST_ANALYSIS_DEMO_SCHEDULE_ENABLED != 'false' &&
              (vars.TA4J_TAGGED_TEST_ANALYSIS_DEMO_SCHEDULE_SLOT == '' ||
               vars.TA4J_TAGGED_TEST_ANALYSIS_DEMO_SCHEDULE_SLOT == 'weekly')
            ) ||
            (
              vars.TA4J_TAGGED_TEST_ANALYSIS_DEMO_SCHEDULE_ENABLED == 'true' &&
              (
                (vars.TA4J_TAGGED_TEST_ANALYSIS_DEMO_SCHEDULE_SLOT == 'daily' && github.event.schedule == '7 7 * * *') ||
                (vars.TA4J_TAGGED_TEST_ANALYSIS_DEMO_SCHEDULE_SLOT == 'monthly' && github.event.schedule == '27 7 1 * *')
              )
            )
          )
        )
      }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Resolve analysis demo instrument
        env:
          DEFAULT_ANALYSIS_DEMO_INSTRUMENT: coinbase:BTC-USD
          DISPATCH_INSTRUMENT: ${{ github.event.inputs.instrument }}
          SCHEDULED_INSTRUMENT: ${{ vars.TA4J_ANALYSIS_DEMO_INSTRUMENT }}
        run: |
          set -euo pipefail
          instrument="${DEFAULT_ANALYSIS_DEMO_INSTRUMENT}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ -n "${DISPATCH_INSTRUMENT:-}" ]; then
              instrument="${DISPATCH_INSTRUMENT}"
            fi
          elif [ -n "${SCHEDULED_INSTRUMENT:-}" ]; then
            instrument="${SCHEDULED_INSTRUMENT}"
          fi

          provider="${instrument%%:*}"
          product="${instrument#*:}"
          if [ "${instrument}" = "${product}" ] || [ -z "${provider}" ] || [ -z "${product}" ]; then
            echo "::error::analysis-demo instrument must use provider-qualified format, for example coinbase:BTC-USD"
            exit 1
          fi
          if [ "${provider,,}" != "coinbase" ]; then
            echo "::error::Unsupported analysis-demo provider '${provider}'. Supported providers: coinbase"
            exit 1
          fi
          if [[ ! "${product}" =~ ^[A-Za-z0-9]+([/-][A-Za-z0-9]+)+$ ]]; then
            echo "::error::Coinbase analysis-demo product id must use Coinbase product format, for example BTC-USD"
            exit 1
          fi

          printf 'TA4J_ANALYSIS_DEMO_INSTRUMENT=%s\n' "${instrument}" >> "${GITHUB_ENV}"
          echo "analysis-demo:instrument=${instrument}"

      - name: Build and run analysis-demo tagged tests with Maven
        run: >
          xvfb-run mvn -B test
          -Dgroups=analysis-demo
          -Dta4j.excludedTestTags=elliott-macro-cycle-replay
          -Dta4j.analysisDemoInstrument="${TA4J_ANALYSIS_DEMO_INSTRUMENT}"
          -Dta4j.analysisDemoOutputDir=target/analysis-demos/elliott-wave
          -Dta4j.lpplDemoOutputDir=target/analysis-demos/lppl-sector-rotation
          -Dta4j.lpplReferenceDataDir=ta4j-examples/src/main/resources
          -Dta4j.lpplUpdateReferenceData=true

      - name: Detect LPPL reference data changes
        id: lppl_reference_data
        run: |
          set -euo pipefail
          if git diff --quiet -- 'ta4j-examples/src/main/resources/YahooFinance-X*.json'; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create or update LPPL reference data pull request
        if: steps.lppl_reference_data.outputs.changed == 'true' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="automation/lppl-spdr-reference-data"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "${branch}:refs/remotes/origin/${branch}" || true
          git switch -c "${branch}"
          git add 'ta4j-examples/src/main/resources/YahooFinance-X*.json'
          git commit -m "Update SPDR LPPL reference data"
          git push --force-with-lease origin "HEAD:${branch}"

          body_file="$(mktemp)"
          cat > "${body_file}" <<'PR_BODY'
          Updates the adjusted daily SPDR sector ETF reference data used by the LPPL analysis demo.

          This PR was opened by the `analysis-demo` workflow after an incremental Yahoo Finance refresh.
          PR_BODY

          existing_pr="$(gh pr list --state open --head "${branch}" --json number --jq '.[0].number // empty')"
          if [ -n "${existing_pr}" ]; then
            gh pr edit "${existing_pr}" --title "Update SPDR LPPL reference data" --body-file "${body_file}"
          else
            gh pr create --base master --head "${branch}" --title "Update SPDR LPPL reference data" --body-file "${body_file}"
          fi

      - name: Upload analysis demo artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-demo-reports
          path: target/analysis-demos/**
          if-no-files-found: warn
